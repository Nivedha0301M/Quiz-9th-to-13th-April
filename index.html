const quizDiv = document.getElementById("quiz");

questions.forEach((q, index) => {
    let div = document.createElement("div");
    div.className = "question";

    let html = `<b>${q.q}</b><br>`;
    
    q.options.forEach((opt, i) => {
        html += `<div class="option" onclick="check(this,${index},${i})">${opt}</div>`;
    });

    html += `<div class="explanation" id="exp${index}"></div>`;
    div.innerHTML = html;

    quizDiv.appendChild(div);
});

function check(el, qIndex, optIndex){
    const q = questions[qIndex];
    const options = el.parentNode.querySelectorAll(".option");

    options.forEach(o => o.onclick=null);

    if(optIndex === q.answer){
        el.classList.add("correct");
    } else {
        el.classList.add("wrong");
        options[q.answer].classList.add("correct");
    }

    const expDiv = document.getElementById("exp"+qIndex);
    expDiv.style.display="block";
    expDiv.innerHTML = "<b>Explanation:</b> " + q.exp;
}
